name: Release
on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g. v1.2.3
      - v*
jobs:
  pypi:
    environment: release
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match pyproject.toml version ($TOML_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - run: uv build

      - run: uv publish

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} dist/* --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}